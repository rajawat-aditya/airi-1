<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Airi — Downloading Models</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      user-select: none;
    }
    .logo { font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.5px; }
    .subtitle { font-size: 13px; color: #888; }
    .models { width: 380px; display: flex; flex-direction: column; gap: 14px; }
    .model-row { display: flex; flex-direction: column; gap: 6px; }
    .model-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; }
    .bar-bg { background: #1e1e2a; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: #6c63ff; transition: width 0.3s ease; width: 0%; }
    .status { font-size: 12px; color: #666; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">Airi</div>
  <div class="subtitle">Setting up AI models for first use...</div>
  <div class="models">
    <div class="model-row">
      <div class="model-label">
        <span>Qwen3-VL 2B (Vision Model)</span>
        <span id="pct-main">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-main"></div></div>
    </div>
    <div class="model-row">
      <div class="model-label">
        <span>Qwen3-VL Projector</span>
        <span id="pct-mmproj">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-mmproj"></div></div>
    </div>
    <div class="model-row">
      <div class="model-label">
        <span>Embedding Model</span>
        <span id="pct-embed">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-embed"></div></div>
    </div>
  </div>
  <div class="status" id="status">Preparing download...</div>

  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('download-progress', (_, { model, percent, status }) => {
      const bar = document.getElementById('bar-' + model);
      const pct = document.getElementById('pct-' + model);
      if (bar) bar.style.width = percent + '%';
      if (pct) pct.textContent = percent + '%';
      if (status) document.getElementById('status').textContent = status;
    });
  </script>
</body>
</html>
